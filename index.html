<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberGuard AI — Cybersecurity Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0a0e17;
    --surface:   #111827;
    --surface2:  #1a2235;
    --border:    #1f2d45;
    --accent:    #00d4ff;
    --accent2:   #0066ff;
    --danger:    #ff4757;
    --success:   #00e676;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --user-bg:   #0d2137;
    --bot-bg:    #111827;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .model-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  .status-dot.loading {
    background: #f59e0b;
  }

  .status-dot.error {
    background: var(--danger);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── API Key Setup Banner ── */
  #setup-banner {
    background: linear-gradient(90deg, #0d1f3c, #0a1628);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #setup-banner span {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  #hf-token-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  #hf-token-input:focus {
    border-color: var(--accent);
  }

  #save-token-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  #save-token-btn:hover { opacity: 0.85; }

  /* ── Chat Area ── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Welcome Screen ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 24px;
    padding: 40px 20px;
    text-align: center;
  }

  .welcome-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
  }

  .welcome h2 {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  .welcome p {
    font-size: 14px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.6;
  }

  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 560px;
  }

  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
    line-height: 1.4;
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    background: var(--surface2);
    color: var(--accent);
  }

  .suggestion-chip .chip-icon {
    display: block;
    font-size: 16px;
    margin-bottom: 6px;
  }

  /* ── Messages ── */
  .message {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, #1e3a5f, #2d5986);
  }

  .message.bot .avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
  }

  .bubble {
    padding: 14px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 680px;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid #1a3a5c;
    border-top-right-radius: 4px;
    color: #cbd5e1;
  }

  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble code {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .bubble pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #a8d8a8;
    line-height: 1.6;
  }

  /* ── Typing Indicator ── */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Loading Status ── */
  .loading-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 0;
  }

  .loading-bar {
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    animation: loadingSlide 1.5s infinite;
  }

  @keyframes loadingSlide {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* ── Error Message ── */
  .error-bubble {
    background: rgba(255, 71, 87, 0.08);
    border: 1px solid rgba(255, 71, 87, 0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff6b7a;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  /* ── Input Area ── */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
  }

  #message-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #message-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }

  .input-footer span {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  #clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  #clear-btn:hover { color: var(--danger); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    #chat-container { padding: 16px; }
    #input-area { padding: 12px 16px; }
    #setup-banner { flex-wrap: wrap; }
    .suggestions { grid-template-columns: 1fr; }
    .bubble { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>CyberGuard AI</h1>
      <p>Powered by Lowkey333/qwen-cyber-expert</p>
    </div>
  </div>
  <div class="header-right">
    <div class="model-badge">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
</header>

<!-- HuggingFace Token Setup -->
<div id="setup-banner">
  <span>🔑 HF Token:</span>
  <input
    type="password"
    id="hf-token-input"
    placeholder="hf_xxxxxxxxxxxxxxxxxxxx  — paste your HuggingFace token here"
  />
  <button id="save-token-btn">Save & Connect</button>
</div>

<!-- Chat -->
<div id="chat-container">
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">🛡️</div>
    <h2>CyberGuard AI</h2>
    <p>Your fine-tuned cybersecurity expert. Ask anything about threats, vulnerabilities, attacks, and defenses.</p>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="useSuggestion(this)">
        <span class="chip-icon">💉</span>
        What is SQL injection and how do I prevent it?
      </button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">
        <span class="chip-icon">🔐</span>
        Explain how ransomware attacks work
      </button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">
        <span class="chip-icon">📋</span>
        What is the OWASP Top 10?
      </button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">
        <span class="chip-icon">🌐</span>
        How does a man-in-the-middle attack work?
      </button>
    </div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-wrapper">
    <textarea
      id="message-input"
      placeholder="Ask a cybersecurity question..."
      rows="1"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-footer">
    <span id="model-info">Model: Lowkey333/qwen-cyber-expert • HuggingFace Inference API</span>
    <button id="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  const MODEL_ID   = "Lowkey333/qwen-cyber-expert";
  const HF_API_URL = `https://api-inference.huggingface.co/models/${MODEL_ID}`;

  const SYSTEM_PROMPT = `You are CyberGuard AI, an expert cybersecurity assistant fine-tuned on cybersecurity data. 
You provide clear, accurate, and detailed answers about:
- Cyber attacks and how they work (SQL injection, XSS, DDoS, phishing, ransomware, etc.)
- Security frameworks (OWASP, MITRE ATT&CK, NIST, ISO 27001)
- Defensive strategies and best practices
- Vulnerability assessment and penetration testing concepts
- Network security, cryptography, and secure coding
Always explain concepts clearly with examples where helpful.`;

  // ── State ────────────────────────────────────────────────────
  let hfToken      = localStorage.getItem("hf_token") || "";
  let isWaiting    = false;
  let chatHistory  = [];

  // ── Init ─────────────────────────────────────────────────────
  window.onload = () => {
    if (hfToken) {
      document.getElementById("hf-token-input").value = "••••••••••••••••••••";
      setStatus("ready", "Connected");
    }
    autoResize();
  };

  // ── Token Save ───────────────────────────────────────────────
  document.getElementById("save-token-btn").addEventListener("click", () => {
    const val = document.getElementById("hf-token-input").value.trim();
    if (!val || val.startsWith("•")) return;
    if (!val.startsWith("hf_")) {
      alert("Token should start with 'hf_' — get it from huggingface.co/settings/tokens");
      return;
    }
    hfToken = val;
    localStorage.setItem("hf_token", hfToken);
    document.getElementById("hf-token-input").value = "••••••••••••••••••••";
    setStatus("ready", "Connected");
    appendMessage("bot", "✅ Token saved! I'm connected to your fine-tuned model. Ask me anything about cybersecurity.");
    hideWelcome();
  });

  // ── Status ───────────────────────────────────────────────────
  function setStatus(state, text) {
    const dot  = document.getElementById("status-dot");
    const span = document.getElementById("status-text");
    dot.className  = "status-dot" + (state !== "ready" ? " " + state : "");
    span.textContent = text;
  }

  // ── Send Message ─────────────────────────────────────────────
  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById("message-input");
    const text  = input.value.trim();
    if (!text) return;

    if (!hfToken) {
      alert("Please paste your HuggingFace token first and click Save & Connect.");
      return;
    }

    hideWelcome();
    appendMessage("user", text);
    chatHistory.push({ role: "user", content: text });
    input.value = "";
    autoResize();

    isWaiting = true;
    document.getElementById("send-btn").disabled = true;
    setStatus("loading", "Thinking...");

    const typingId = showTyping();

    try {
      const response = await callHuggingFace(text);
      removeTyping(typingId);
      appendMessage("bot", response);
      chatHistory.push({ role: "assistant", content: response });
      setStatus("ready", "Connected");
    } catch (err) {
      removeTyping(typingId);
      showError(err.message);
      setStatus("error", "Error");
      setTimeout(() => setStatus("ready", "Connected"), 3000);
    }

    isWaiting = false;
    document.getElementById("send-btn").disabled = false;
  }

  // ── HuggingFace API Call ─────────────────────────────────────
  async function callHuggingFace(userMessage) {
    // Build prompt in Qwen chat format
    let prompt = `<|im_start|>system\n${SYSTEM_PROMPT}<|im_end|>\n`;

    // Add last 4 turns of history for context
    const recentHistory = chatHistory.slice(-8);
    for (const msg of recentHistory) {
      if (msg.role === "user") {
        prompt += `<|im_start|>user\n${msg.content}<|im_end|>\n`;
      } else {
        prompt += `<|im_start|>assistant\n${msg.content}<|im_end|>\n`;
      }
    }
    prompt += `<|im_start|>assistant\n`;

    const payload = {
      inputs: prompt,
      parameters: {
        max_new_tokens: 512,
        temperature: 0.7,
        top_p: 0.9,
        do_sample: true,
        return_full_text: false,
        stop: ["<|im_end|>", "<|im_start|>"]
      }
    };

    const res = await fetch(HF_API_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${hfToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    // Model loading (HF inference API cold starts)
    if (res.status === 503) {
      const data = await res.json();
      const waitTime = data.estimated_time || 30;
      updateTypingText(`Model is loading — ready in ~${Math.ceil(waitTime)}s. HuggingFace free tier cold-starts the model on first use.`);
      await sleep(waitTime * 1000);
      return callHuggingFace(userMessage); // retry
    }

    if (res.status === 401) {
      throw new Error("Invalid HuggingFace token. Check it at huggingface.co/settings/tokens");
    }

    if (res.status === 404) {
      throw new Error(`Model '${MODEL_ID}' not found. Make sure it's public or your token has access.`);
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `API error ${res.status}`);
    }

    const data = await res.json();

    // Parse response
    let text = "";
    if (Array.isArray(data) && data[0]?.generated_text) {
      text = data[0].generated_text;
    } else if (data.generated_text) {
      text = data.generated_text;
    } else {
      throw new Error("Unexpected response format from HuggingFace API");
    }

    // Clean up any trailing special tokens
    text = text
      .replace(/<\|im_end\|>/g, "")
      .replace(/<\|im_start\|>/g, "")
      .replace(/^assistant\n/i, "")
      .trim();

    return text || "I couldn't generate a response. Please try again.";
  }

  // ── UI Helpers ────────────────────────────────────────────────
  function appendMessage(role, text) {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = `message ${role}`;

    const avatar = role === "user" ? "👤" : "🛡️";
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${formatText(text)}</div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function formatText(text) {
    // Basic markdown-like formatting
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/```([\s\S]*?)```/g, "<pre>$1</pre>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  }

  let typingEl = null;

  function showTyping() {
    const container = document.getElementById("chat-container");
    const id = "typing-" + Date.now();
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = id;
    div.innerHTML = `
      <div class="avatar">🛡️</div>
      <div class="bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
        <div class="loading-status" id="typing-status-${id}" style="display:none;">
          <div class="loading-bar"><div class="loading-bar-fill"></div></div>
          <span id="typing-msg-${id}"></span>
        </div>
      </div>
    `;
    container.appendChild(div);
    typingEl = id;
    scrollToBottom();
    return id;
  }

  function updateTypingText(msg) {
    const statusEl = document.getElementById(`typing-status-${typingEl}`);
    const msgEl    = document.getElementById(`typing-msg-${typingEl}`);
    if (statusEl && msgEl) {
      statusEl.style.display = "flex";
      msgEl.textContent = msg;
      setStatus("loading", "Loading model...");
    }
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
    typingEl = null;
  }

  function showError(msg) {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = "message bot";
    div.innerHTML = `
      <div class="avatar">🛡️</div>
      <div class="error-bubble">⚠️ ${msg}</div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function hideWelcome() {
    const w = document.getElementById("welcome-screen");
    if (w) w.remove();
  }

  function scrollToBottom() {
    const c = document.getElementById("chat-container");
    c.scrollTop = c.scrollHeight;
  }

  function useSuggestion(btn) {
    const text = btn.innerText.trim();
    document.getElementById("message-input").value = text;
    sendMessage();
  }

  function clearChat() {
    chatHistory = [];
    const container = document.getElementById("chat-container");
    container.innerHTML = "";
    setStatus("ready", "Connected");
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Input Events ─────────────────────────────────────────────
  document.getElementById("send-btn").addEventListener("click", sendMessage);

  document.getElementById("message-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.getElementById("message-input").addEventListener("input", autoResize);

  function autoResize() {
    const el = document.getElementById("message-input");
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }
</script>
</body>
</html>
